  <script>
    
document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

 U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n/* vietnamese */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"700717ec-1086-433a-97aa-1ac4c0a71c77\") format('woff2');\n  unicode-range: U+0102-0103, U+0110-0111, U+0128-0129, U+0168-0169, U+01A0-01A1, U+01AF-01B0, U+0300-0301, U+0303-0304, U+0308-0309, U+0323, U+0329, U+1EA0-1EF9, U+20AB;\n}\n/* latin-ext */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"bcf7e5b0-c78f-462e-914d-608b5db975ba\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Space Grotesk';\n  font-style: normal;\n  font-weight: 700;\n  font-display: swap;\n  src: url(\"893bc48d-5ca8-4e61-b1fc-9dd3663ada4e\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* Self-hosted webfaces */\n/* ============================================================\n   HMR — Webfonts\n   Persian / Arabic UI text → Vazirmatn (self-hosted, variable).\n   Latin / display / numerals → Space Grotesk (Google Fonts, loaded\n   in styles.css via @import for reliable Latin coverage).\n   Self-hosting Vazirmatn fixes the unreliable gradient-text + weight\n   rendering seen when it was pulled from the Google Fonts CDN.\n   ============================================================ */\n\n/* Variable font carries every weight (100–900) in one file. */\n@font-face {\n  font-family: 'Vazirmatn';\n  src: url(\"3fc3a6c5-199b-4b2e-8ae6-6b494f198d45\") format('truetype-variations'),\n       url(\"3fc3a6c5-199b-4b2e-8ae6-6b494f198d45\") format('truetype');\n  font-weight: 100 900;\n  font-style: normal;\n  font-display: swap;\n}\n\n/* Static fallbacks for engines that ignore the variable axis. */\n@font-face {\n  font-family: 'Vazirmatn Static';\n  src: url(\"d6e1d32b-0ba9-46fb-a3de-c7e14aaefd40\") format('truetype');\n  font-weight: 400;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Vazirmatn Static';\n  src: url(\"561ecc18-8edd-466d-9d66-b2c030d665b4\") format('truetype');\n  font-weight: 500;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Vazirmatn Static';\n  src: url(\"f3b3eac9-19c5-4de7-9df3-90e674eecbee\") format('truetype');\n  font-weight: 600;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Vazirmatn Static';\n  src: url(\"4adee493-d43a-4ba2-8869-268ec0d2be96\") format('truetype');\n  font-weight: 700;\n  font-display: swap;\n}\n@font-face {\n  font-family: 'Vazirmatn Static';\n  src: url(\"bb838fac-8517-4dcb-ac0e-7fa217b0340a\") format('truetype');\n  font-weight: 900;\n  font-display: swap;\n}\n\n\n/* Design tokens */\n/* ============================================================\n   HMR — Color tokens\n   Theme: dark neon-blue glassmorphism.\n   The original site mixed cyan + pink + purple; the refined\n   system is BLUE-dominant — cyan → electric blue → indigo —\n   with pink/violet demoted to rare spectrum accents (logo only).\n   ============================================================ */\n:root {\n  /* ---- Base / navy ramp (page → elevated surfaces) ---- */\n  --hmr-navy-950: #05070f;   /* deepest page base */\n  --hmr-navy-900: #070b16;\n  --hmr-navy-850: #0a0f1f;   /* original --bg-2 */\n  --hmr-navy-800: #0e1426;\n  --hmr-navy-700: #131c34;\n  --hmr-navy-600: #1b2746;\n\n  /* ---- Neon ramp (the brand's light) ---- */\n  --hmr-cyan:        #00d4ff;  /* signature neon — keep */\n  --hmr-cyan-soft:   #5ce1ff;\n  --hmr-blue:        #2f6bff;  /* electric blue — new core */\n  --hmr-blue-bright: #3b82f6;\n  --hmr-indigo:      #6366f1;  /* cool violet-blue, tamed */\n  --hmr-violet:      #7c5cff;  /* spectrum accent, sparing */\n  --hmr-pink:        #ff2d78;  /* legacy accent, logo only */\n  --hmr-amber:       #f6b73c;  /* logo top arc only */\n\n  /* ---- Text ---- */\n  --hmr-text:      #eaf2ff;\n  --hmr-text-2:    #b9c6e4;\n  --hmr-muted:     #8a96b3;\n  --hmr-dim:       #56627f;\n  --hmr-on-accent: #05070f;   /* dark ink on neon fills */\n\n  /* ---- Glass surfaces (translucent — backdrop-blur intended) ---- */\n  --hmr-glass:        rgba(18, 26, 48, 0.55);\n  --hmr-glass-strong: rgba(20, 30, 56, 0.72);\n  --hmr-glass-light:  rgba(255, 255, 255, 0.045);\n  --hmr-glass-icon:   rgba(0, 212, 255, 0.08);  /* tinted icon wells */\n\n  /* ---- Borders / hairlines ---- */\n  --hmr-border:        rgba(0, 212, 255, 0.18);  /* signature cyan hairline */\n  --hmr-border-soft:   rgba(255, 255, 255, 0.06);\n  --hmr-border-glow:   rgba(0, 212, 255, 0.45);  /* hover / focus */\n  --hmr-border-blue:   rgba(47, 107, 255, 0.30);\n\n  /* ---- Semantic status ---- */\n  --hmr-success: #34e0a1;\n  --hmr-warning: #f6b73c;\n  --hmr-danger:  #ff5470;\n\n  /* =========================================================\n     Semantic aliases — reference these in components / kits\n     ========================================================= */\n  --surface-page:     var(--hmr-navy-950);\n  --surface-page-2:   var(--hmr-navy-850);\n  --surface-card:     var(--hmr-glass);\n  --surface-card-2:   var(--hmr-glass-strong);\n  --surface-well:     var(--hmr-glass-icon);\n\n  --border-subtle:    var(--hmr-border);\n  --border-hairline:  var(--hmr-border-soft);\n  --border-glow:      var(--hmr-border-glow);\n\n  --text-body:        var(--hmr-text);\n  --text-secondary:   var(--hmr-text-2);\n  --text-muted:       var(--hmr-muted);\n  --text-on-accent:   var(--hmr-on-accent);\n\n  --accent:           var(--hmr-cyan);\n  --accent-2:         var(--hmr-blue);\n  --accent-3:         var(--hmr-indigo);\n\n  /* ---- Brand gradients (blue-dominant, smooth, clean for text-clip) ---- */\n  --gradient-brand:  linear-gradient(100deg, var(--hmr-cyan) 0%, var(--hmr-blue) 52%, var(--hmr-indigo) 100%);\n  --gradient-cta:    linear-gradient(100deg, var(--hmr-cyan) 0%, var(--hmr-blue-bright) 100%);\n  --gradient-text:   linear-gradient(95deg, var(--hmr-cyan-soft) 0%, var(--hmr-blue-bright) 60%, var(--hmr-indigo) 100%);\n  --gradient-spectrum: linear-gradient(120deg, var(--hmr-amber), var(--hmr-pink) 38%, var(--hmr-cyan) 72%, var(--hmr-blue));\n\n  /* ---- Ambient glow blobs ---- */\n  --glow-cyan:   var(--hmr-cyan);\n  --glow-blue:   var(--hmr-blue);\n  --glow-indigo: var(--hmr-indigo);\n}\n\n/* ============================================================\n   HMR — Typography tokens\n   Latin / display / numerals → Space Grotesk (geometric, techy).\n   Persian / Arabic body      → Vazirmatn (self-hosted variable).\n   The site is bilingual + RTL-aware: body[data-lang=\"fa\"] swaps\n   the stack and flips direction.\n   ============================================================ */\n:root {\n  /* ---- Families ---- */\n  --font-display: 'Space Grotesk', 'Vazirmatn', system-ui, sans-serif;\n  --font-en:      'Space Grotesk', system-ui, sans-serif;\n  --font-fa:      'Vazirmatn', 'Vazirmatn Static', system-ui, sans-serif;\n  --font-body:    var(--font-en);\n  --font-mono:    'Space Grotesk', ui-monospace, 'SF Mono', monospace;\n\n  /* ---- Weights ---- */\n  --fw-light:    300; /* @kind font */\n  --fw-regular:  400; /* @kind font */\n  --fw-medium:   500; /* @kind font */\n  --fw-semibold: 600; /* @kind font */\n  --fw-bold:     700; /* @kind font */\n  --fw-black:    900; /* @kind font */\n\n  /* ---- Type scale (fluid where it matters) ---- */\n  --fs-display:  clamp(2.3rem, 6vw, 4rem); /* @kind font */\n  --fs-h1:       clamp(2rem, 5vw, 3rem); /* @kind font */\n  --fs-h2:       1.6rem; /* @kind font */\n  --fs-h3:       1.15rem; /* @kind font */\n  --fs-lead:     clamp(1rem, 2.2vw, 1.2rem); /* @kind font */\n  --fs-body:     0.95rem; /* @kind font */\n  --fs-sm:       0.88rem; /* @kind font */\n  --fs-xs:       0.8rem; /* @kind font */\n  --fs-badge:    0.78rem; /* @kind font */\n\n  /* ---- Line heights ---- */\n  --lh-tight:   1.08; /* @kind font */\n  --lh-snug:    1.3; /* @kind font */\n  --lh-body:    1.65; /* @kind font */\n  --lh-relaxed: 1.8; /* @kind font */\n\n  /* ---- Letter spacing ---- */\n  --ls-logo:    0.04em; /* @kind font */\n  --ls-badge:   0.1em; /* @kind font */\n  --ls-caps:    0.06em; /* @kind font */\n  --ls-normal:  0; /* @kind font */\n}\n\n/* ============================================================\n   HMR — Spacing & layout tokens\n   ============================================================ */\n:root {\n  /* ---- Spacing scale ---- */\n  --space-0:  0;\n  --space-1:  4px;\n  --space-2:  8px;\n  --space-3:  12px;\n  --space-4:  16px;\n  --space-5:  20px;\n  --space-6:  24px;\n  --space-8:  32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n\n  /* ---- Layout ---- */\n  --wrap-max:    1100px;   /* the site's content column */\n  --wrap-pad:    24px;\n  --page-narrow: 720px;    /* about / privacy reading width */\n  --page-form:   680px;    /* contact width */\n\n  /* ---- Radii ---- */\n  --radius-sm:   8px;    /* nav links, small chips */\n  --radius-md:   12px;   /* icon wells, contact cards */\n  --radius-lg:   14px;   /* CTA buttons, stat tiles */\n  --radius-xl:   18px;   /* feature cards */\n  --radius-2xl:  20px;   /* chat frame */\n  --radius-pill: 999px;  /* badges, lang toggle */\n}\n\n/* ============================================================\n   HMR — Effects: glass blur, shadows, glows, motion\n   Glassmorphism is the core motif: translucent navy fills +\n   backdrop-blur + a thin neon hairline + soft cyan glow on hover.\n   ============================================================ */\n:root {\n  /* ---- Backdrop blur (the \"glass\") ---- */\n  --blur-glass:    blur(14px); /* @kind other */\n  --blur-glass-sm: blur(10px); /* @kind other */\n  --blur-glow:     blur(120px); /* @kind other */\n\n  /* ---- Shadows & glows ---- */\n  --shadow-card:       0 16px 50px rgba(0, 212, 255, 0.10);\n  --shadow-card-rest:  0 8px 30px rgba(0, 0, 0, 0.35);\n  --shadow-cta:        0 0 0 1px rgba(0, 212, 255, 0.4), 0 12px 40px rgba(0, 212, 255, 0.25);\n  --shadow-cta-hover:  0 0 0 1px rgba(0, 212, 255, 0.6), 0 16px 50px rgba(0, 212, 255, 0.38);\n  --shadow-frame:      0 0 0 1px rgba(0, 212, 255, 0.1), 0 24px 60px rgba(0, 0, 0, 0.5);\n  --glow-ring:         0 0 0 1px rgba(0, 212, 255, 0.4);\n  --glow-focus:        0 0 0 3px rgba(0, 212, 255, 0.28);\n\n  /* ---- Ambient blob opacity ---- */\n  --glow-opacity:     0.30; /* @kind other */\n  --glow-opacity-dim: 0.15; /* @kind other */\n\n  /* ---- Motion ---- */\n  --ease-out:   cubic-bezier(0.22, 1, 0.36, 1); /* @kind other */\n  --ease-soft:  cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --dur-fast:   0.2s; /* @kind other */\n  --dur-med:    0.25s; /* @kind other */\n  --dur-slow:   0.4s; /* @kind other */\n\n  /* hover lift used across cards */\n  --lift-card: translateY(-4px); /* @kind other */\n  --lift-cta:  translateY(-2px); /* @kind other */\n}\n\n\n/* Base reset, body, RTL, and shared utility classes */\n/* ============================================================\n   HMR — Base reset, document shell, RTL, and shared utilities.\n   ============================================================ */\n\n* { margin: 0; padding: 0; box-sizing: border-box; }\nhtml { scroll-behavior: smooth; }\n\nbody {\n  background: var(--surface-page);\n  color: var(--text-body);\n  font-family: var(--font-body);\n  font-size: var(--fs-body);\n  line-height: var(--lh-body);\n  min-height: 100vh;\n  overflow-x: hidden;\n  position: relative;\n  -webkit-font-smoothing: antialiased;\n  text-rendering: optimizeLegibility;\n}\n\n/* ---- Bilingual: Persian swaps face + flips direction ---- */\nbody[data-lang=\"fa\"] { font-family: var(--font-fa); direction: rtl; }\nbody[data-lang=\"fa\"] .en { display: none !important; }\nbody[data-lang=\"en\"] .fa { display: none !important; }\n\n/* ============================================================\n   Ambient background: neural particle canvas + glow blobs\n   ============================================================ */\n#particles { position: fixed; inset: 0; z-index: 0; pointer-events: none; }\n\n.glow {\n  position: fixed; border-radius: 50%;\n  filter: var(--blur-glow); opacity: var(--glow-opacity);\n  z-index: 0; pointer-events: none;\n}\n.glow-1 { width: 460px; height: 460px; background: var(--glow-cyan);   top: -120px; left: -100px; }\n.glow-2 { width: 420px; height: 420px; background: var(--glow-indigo); bottom: -140px; right: -120px; }\n.glow-3 { width: 320px; height: 320px; background: var(--glow-blue);   top: 40%; left: 60%; opacity: var(--glow-opacity-dim); }\n\n/* ============================================================\n   Layout helpers\n   ============================================================ */\n.hmr-wrap {\n  position: relative; z-index: 2;\n  max-width: var(--wrap-max); margin: 0 auto; padding: 0 var(--wrap-pad);\n}\n\n/* ============================================================\n   Utility: gradient text (the FIXED, precise version)\n   Tight blue gradient + explicit text-fill + 100% size so the\n   clip is crisp at every weight, incl. Vazirmatn Persian glyphs.\n   ============================================================ */\n.hmr-gradient-text {\n  background: var(--gradient-text);\n  background-size: 100% 100%;\n  -webkit-background-clip: text;\n  background-clip: text;\n  -webkit-text-fill-color: transparent;\n  color: transparent;\n  /* keep descenders/diacritics from clipping on RTL glyphs */\n  padding-bottom: 0.04em;\n  /* nudge anti-aliasing so the fill reads cleanly on dark glass */\n  text-shadow: 0 0 24px rgba(0, 212, 255, 0.18);\n}\n\n/* ============================================================\n   Utility: glass surface\n   ============================================================ */\n.hmr-glass {\n  background: var(--surface-card);\n  border: 1px solid var(--border-subtle);\n  border-radius: var(--radius-xl);\n  -webkit-backdrop-filter: var(--blur-glass);\n  backdrop-filter: var(--blur-glass);\n}\n\n@media (prefers-reduced-motion: reduce) {\n  #particles { display: none; }\n  * { animation-duration: 0.001ms !important; transition-duration: 0.001ms !important; }\n}\n\n<\u002Fstyle>\n  <style>\n    /* ── Page shell ─────────────────────────────────────────── */\n    html, body { height: 100%; overflow: hidden; }\n    body { background: var(--surface-page); }\n\n    .glow-1 { width: 520px; height: 520px; background: var(--glow-cyan);   top: -160px; left: -120px; opacity: .22; }\n    .glow-2 { width: 460px; height: 460px; background: var(--glow-indigo); bottom: -180px; right: 200px; opacity: .20; }\n\n    .app {\n      position: relative; z-index: 2;\n      height: 100vh; display: flex;\n    }\n\n    /* ── Sidebar (right, RTL) ───────────────────────────────── */\n    .sidebar {\n      width: 290px; flex-shrink: 0;\n      display: flex; flex-direction: column;\n      border-inline-end: 1px solid var(--border-subtle);\n      background: rgba(8, 12, 24, 0.5);\n      -webkit-backdrop-filter: var(--blur-glass);\n      backdrop-filter: var(--blur-glass);\n      transition: width var(--dur-med) var(--ease-out), opacity var(--dur-med) var(--ease-out);\n    }\n    .app.sb-collapsed .sidebar { width: 0; opacity: 0; pointer-events: none; overflow: hidden; }\n\n    .sb-top { padding: 18px 18px 14px; }\n    .sb-brand-row {\n      display: flex; align-items: center; justify-content: space-between;\n      margin-bottom: 18px;\n    }\n    .sb-wordmark {\n      font-family: var(--font-en);\n      font-weight: 700; font-size: 1.35rem; line-height: 1;\n      letter-spacing: 0.04em;\n    }\n    .sb-tools { display: flex; align-items: center; gap: 6px; }\n    .icon-btn {\n      width: 34px; height: 34px; border-radius: 9px;\n      display: flex; align-items: center; justify-content: center;\n      background: transparent; border: 1px solid transparent;\n      color: var(--text-muted); cursor: pointer;\n      transition: color var(--dur-fast) var(--ease-out), background var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);\n    }\n    .icon-btn:hover { color: var(--text-body); background: var(--surface-well); border-color: var(--border-subtle); }\n    .icon-btn svg { width: 18px; height: 18px; }\n\n    .new-chat {\n      width: 100%;\n      display: flex; align-items: center; justify-content: space-between;\n      gap: 10px; padding: 12px 16px;\n      border-radius: var(--radius-pill);\n      background: var(--surface-card);\n      border: 1px solid var(--border-subtle);\n      color: var(--text-body); cursor: pointer;\n      font-family: var(--font-fa); font-weight: 500; font-size: .88rem;\n      -webkit-backdrop-filter: var(--blur-glass-sm); backdrop-filter: var(--blur-glass-sm);\n      transition: border-color var(--dur-med) var(--ease-out), transform var(--dur-fast) var(--ease-out), box-shadow var(--dur-med) var(--ease-out);\n    }\n    .new-chat:hover { border-color: var(--border-glow); box-shadow: 0 0 0 1px var(--border-glow), 0 8px 26px rgba(0,212,255,.10); transform: translateY(-1px); }\n    .new-chat:active { transform: translateY(0); }\n    .new-chat svg { width: 18px; height: 18px; color: var(--accent); }\n\n    .sb-divider { height: 1px; background: var(--border-subtle); margin: 6px 18px; }\n\n    .sb-hist { flex: 1; min-height: 0; display: flex; flex-direction: column; padding: 6px 10px; }\n    .sb-hist-label {\n      padding: 10px 8px 8px; font-family: var(--font-fa);\n      font-weight: 500; font-size: .9rem; color: var(--text-secondary);\n    }\n    .hist-list { flex: 1; min-height: 0; overflow-y: auto; display: flex; flex-direction: column; gap: 4px; }\n    .hist-empty {\n      padding: 22px 10px; color: var(--text-muted);\n      font-size: .85rem; line-height: 1.8; text-align: center;\n    }\n    .hist-item {\n      display: flex; align-items: center; gap: 9px;\n      padding: 10px 12px; border-radius: 10px; cursor: pointer;\n      color: var(--text-secondary); font-size: .84rem;\n      border: 1px solid transparent;\n      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;\n      transition: background var(--dur-fast) var(--ease-out), color var(--dur-fast) var(--ease-out), border-color var(--dur-fast) var(--ease-out);\n    }\n    .hist-item:hover { background: var(--surface-well); color: var(--text-body); border-color: var(--border-subtle); }\n    .hist-item.active { background: var(--surface-well); color: var(--text-body); border-color: var(--border-subtle); }\n    .hist-item svg { width: 15px; height: 15px; flex-shrink: 0; color: var(--text-muted); }\n    .hist-item span { overflow: hidden; text-overflow: ellipsis; }\n\n    /* ── Sidebar footer: login + avatar ─────────────────────── */\n    .sb-foot { padding: 12px 14px; border-top: 1px solid var(--border-subtle); }\n    .login {\n      width: 100%;\n      display: flex; align-items: center; gap: 11px;\n      padding: 9px 12px; border-radius: var(--radius-pill);\n      background: transparent; border: 1px solid var(--border-subtle);\n      color: var(--text-body); cursor: pointer;\n      font-family: var(--font-fa); font-weight: 500; font-size: .86rem;\n      transition: border-color var(--dur-med) var(--ease-out), background var(--dur-fast) var(--ease-out);\n    }\n    .login:hover { border-color: var(--border-glow); background: var(--surface-well); }\n    .avatar {\n      width: 30px; height: 30px; border-radius: 50%; flex: 0 0 30px;\n      background: var(--gradient-cta);\n      box-shadow: 0 0 0 1px rgba(255,255,255,.12) inset, 0 2px 10px rgba(0,212,255,.35);\n    }\n    .login > span:last-child { flex: 1; text-align: start; }\n\n    /* ── Main column ────────────────────────────────────────── */\n    .main { flex: 1; min-width: 0; display: flex; flex-direction: column; position: relative; }\n\n    .floating-open {\n      position: absolute; top: 16px; inset-inline-start: 16px; z-index: 5;\n      display: none;\n    }\n    .app.sb-collapsed .floating-open { display: flex; }\n\n    .stage {\n      flex: 1; min-height: 0;\n      display: flex; flex-direction: column;\n      align-items: center; justify-content: center;\n      padding: 24px;\n    }\n\n    /* Empty / hero state */\n    .hero { width: 100%; max-width: 720px; display: flex; flex-direction: column; align-items: center; }\n    .hero-orb {\n      width: 96px; height: 96px; margin-bottom: 22px;\n      animation: orb-float 5s var(--ease-out) infinite, orb-glow 3s ease-in-out infinite;\n    }\n    @keyframes orb-float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-7px); } }\n    @keyframes orb-glow {\n      0%,100% { filter: drop-shadow(0 6px 14px rgba(0,212,255,.30)); }\n      50%     { filter: drop-shadow(0 8px 26px rgba(0,212,255,.62)); }\n    }\n    .hero-title {\n      font-family: var(--font-fa); font-weight: 500;\n      font-size: clamp(1.15rem, 2.4vw, 1.5rem); line-height: 1.4;\n      text-align: center; margin-bottom: 0;\n      color: rgba(234,242,255,0.78); letter-spacing: 0.01em;\n      text-shadow: 0 0 20px rgba(0,212,255,0.35);\n    }\n    .hero-sub {\n      color: var(--text-secondary); text-align: center;\n      font-size: 1rem; line-height: 1.9; max-width: 520px; margin-bottom: 30px;\n    }\n\n    /* Composer (the big centered box) */\n    .composer {\n      width: 100%; max-width: 720px; margin: 0 auto;\n      display: flex; align-items: flex-end; gap: 10px;\n      padding: 14px 16px;\n      border-radius: 24px;\n      background: var(--surface-card-2);\n      border: 1px solid var(--border-subtle);\n      -webkit-backdrop-filter: var(--blur-glass); backdrop-filter: var(--blur-glass);\n      box-shadow: 0 18px 50px rgba(0,0,0,.45), inset 0 1px 0 rgba(255,255,255,.04);\n      transition: border-color var(--dur-med) var(--ease-out), box-shadow var(--dur-med) var(--ease-out);\n    }\n    .composer:focus-within {\n      border-color: var(--border-glow);\n      box-shadow: 0 18px 50px rgba(0,0,0,.45), 0 0 0 1px var(--border-glow), 0 0 40px rgba(0,212,255,.14);\n    }\n    .composer textarea {\n      flex: 1; resize: none; border: 0; outline: 0; background: transparent;\n      color: var(--text-body); font-family: var(--font-fa);\n      font-size: 1.02rem; line-height: 1.7; max-height: 180px;\n      padding: 8px 4px;\n    }\n    .composer textarea::placeholder { color: var(--text-muted); }\n    .send-btn {\n      width: 44px; height: 44px; border-radius: 14px; flex-shrink: 0;\n      display: flex; align-items: center; justify-content: center;\n      background: var(--gradient-cta); border: 0; cursor: pointer;\n      color: var(--text-on-accent);\n      box-shadow: 0 4px 18px rgba(0,212,255,.35);\n      transition: transform var(--dur-fast) var(--ease-out), filter var(--dur-fast) var(--ease-out), opacity var(--dur-fast) var(--ease-out);\n    }\n    .send-btn:hover { transform: translateY(-2px); filter: brightness(1.08); }\n    .send-btn:active { transform: translateY(0); }\n    .send-btn:disabled { opacity: .45; cursor: not-allowed; transform: none; box-shadow: none; }\n    .send-btn svg { width: 20px; height: 20px; }\n\n    /* Suggestion chips */\n    .chips { display: flex; flex-wrap: wrap; gap: 10px; justify-content: center; margin-top: 20px; max-width: 720px; }\n    .chip {\n      padding: 9px 15px; border-radius: var(--radius-pill);\n      background: var(--surface-card); border: 1px solid var(--border-subtle);\n      color: var(--text-secondary); font-family: var(--font-fa); font-size: .9rem;\n      cursor: pointer; -webkit-backdrop-filter: var(--blur-glass-sm); backdrop-filter: var(--blur-glass-sm);\n      transition: border-color var(--dur-med) var(--ease-out), color var(--dur-fast) var(--ease-out), transform var(--dur-fast) var(--ease-out);\n    }\n    .chip:hover { border-color: var(--border-glow); color: var(--text-body); transform: translateY(-2px); }\n\n    /* ── Conversation state ─────────────────────────────────── */\n    .main.has-chat .stage { justify-content: flex-start; align-items: stretch; padding: 0; }\n    .main.has-chat .hero-orb { display: none; }\n    .main.has-chat .hero-title, .main.has-chat .hero-sub, .main.has-chat .chips { display: none; }\n\n    .convo-wrap { display: none; flex: 1; min-height: 0; flex-direction: column; }\n    .main.has-chat .convo-wrap { display: flex; }\n    .main.has-chat .hero { display: none; }\n\n    .messages { flex: 1; min-height: 0; overflow-y: auto; padding: 28px 0 16px; }\n    .messages-inner { max-width: 760px; margin: 0 auto; padding: 0 24px; display: flex; flex-direction: column; gap: 18px; }\n\n    .msg { display: flex; gap: 12px; align-items: flex-start; }\n    .msg.user { flex-direction: row-reverse; }\n    .msg-ava {\n      width: 34px; height: 34px; border-radius: 10px; flex-shrink: 0;\n      display: flex; align-items: center; justify-content: center;\n      background: var(--surface-well); border: 1px solid var(--border-subtle); overflow: hidden;\n    }\n    .msg-ava img { width: 26px; height: 26px; }\n    .msg.user .msg-ava { background: var(--gradient-cta); border: 0; }\n    .bubble {\n      padding: 13px 16px; border-radius: 16px; line-height: 1.85;\n      font-size: 1rem; max-width: 80%; white-space: pre-wrap; word-break: break-word;\n    }\n    .msg.assistant .bubble {\n      background: var(--surface-card); border: 1px solid var(--border-subtle);\n      color: var(--text-body); border-top-right-radius: 6px;\n    }\n    .msg.user .bubble {\n      background: var(--accent-2); color: #fff; border-top-left-radius: 6px;\n    }\n    .typing { display: inline-flex; gap: 5px; padding: 4px 2px; }\n    .typing i { width: 7px; height: 7px; border-radius: 50%; background: var(--accent); opacity: .5; animation: blink 1.2s infinite; }\n    .typing i:nth-child(2) { animation-delay: .2s; }\n    .typing i:nth-child(3) { animation-delay: .4s; }\n    @keyframes blink { 0%,60%,100% { opacity: .3; transform: translateY(0); } 30% { opacity: 1; transform: translateY(-3px); } }\n\n    .dock { flex-shrink: 0; padding: 12px 24px 16px; }\n    .dock-inner { max-width: 760px; margin: 0 auto; }\n    .main.has-chat .composer { box-shadow: 0 10px 36px rgba(0,0,0,.4); }\n\n    /* ── Footer ─────────────────────────────────────────────── */\n    .foot { flex-shrink: 0; padding: 14px 24px 20px; text-align: center; }\n    .foot-links { display: inline-flex; align-items: center; gap: 14px; flex-wrap: wrap; justify-content: center; }\n    .foot-links a {\n      color: var(--text-secondary); text-decoration: none; font-size: .88rem;\n      transition: color var(--dur-fast) var(--ease-out);\n    }\n    .foot-links a:hover { color: var(--accent); }\n    .foot-sep { color: var(--hmr-dim); }\n    .main.has-chat .foot { display: none; }\n\n    @media (max-width: 720px) {\n      .sidebar { position: fixed; inset-inline-end: 0; top: 0; height: 100vh; z-index: 30; box-shadow: -20px 0 60px rgba(0,0,0,.6); }\n      .app:not(.sb-collapsed) .main::after { content:''; position:fixed; inset:0; background:rgba(0,0,0,.5); z-index:20; }\n    }\n  <\u002Fstyle>\n<\u002Fhead>\n\n<body data-lang=\"fa\">\n  <canvas id=\"particles\"><\u002Fcanvas>\n  <div class=\"glow glow-1\"><\u002Fdiv>\n  <div class=\"glow glow-2\"><\u002Fdiv>\n\n  <div class=\"app\" id=\"app\">\n    <!-- ── Sidebar ─────────────────────────────────────────── -->\n    <aside class=\"sidebar\">\n      <div class=\"sb-top\">\n        <div class=\"sb-brand-row\">\n          <div class=\"sb-wordmark hmr-gradient-text\">HMR<\u002Fdiv>\n          <div class=\"sb-tools\">\n            <button class=\"icon-btn\" aria-label=\"جستجو\" title=\"جستجو\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><circle cx=\"11\" cy=\"11\" r=\"7\"><\u002Fcircle><path d=\"m21 21-4.3-4.3\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n            <button class=\"icon-btn\" id=\"toggle-sb\" aria-label=\"جمع کردن نوار کناری\" title=\"نوار کناری\">\n              <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M9 4v16\"><\u002Fpath><\u002Fsvg>\n            <\u002Fbutton>\n          <\u002Fdiv>\n        <\u002Fdiv>\n        <button class=\"new-chat\" id=\"new-chat\">\n          <span>گفتگوی جدید<\u002Fspan>\n          <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 5v14M5 12h14\"><\u002Fpath><\u002Fsvg>\n        <\u002Fbutton>\n      <\u002Fdiv>\n\n      <div class=\"sb-divider\"><\u002Fdiv>\n\n      <div class=\"sb-hist\">\n        <div class=\"sb-hist-label\">تاریخچه گفتگو<\u002Fdiv>\n        <div class=\"hist-list\" id=\"hist-list\">\n          <div class=\"hist-empty\">هنوز گفتگویی نداری.<br>برای شروع سؤالت را بپرس.<\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"sb-foot\">\n        <button class=\"login\">\n          <span class=\"avatar\"><\u002Fspan>\n          <span>ورود<\u002Fspan>\n        <\u002Fbutton>\n      <\u002Fdiv>\n    <\u002Faside>\n\n    <!-- ── Main ────────────────────────────────────────────── -->\n    <main class=\"main\" id=\"main\">\n      <button class=\"icon-btn floating-open\" id=\"open-sb\" aria-label=\"باز کردن نوار کناری\" title=\"نوار کناری\">\n        <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><rect x=\"3\" y=\"4\" width=\"18\" height=\"16\" rx=\"2\"><\u002Frect><path d=\"M9 4v16\"><\u002Fpath><\u002Fsvg>\n      <\u002Fbutton>\n\n      <div class=\"stage\">\n        <!-- Empty / hero -->\n        <div class=\"hero\" id=\"hero\">\n          <img class=\"hero-orb\" src=\"1c522297-2baf-4c30-ad01-bf2a736b84e2\" alt=\"HMR\">\n          <h1 class=\"hero-title\">امروز چطور می‌تونم کمکت کنم؟<\u002Fh1>\n        <\u002Fdiv>\n\n        <!-- Conversation -->\n        <div class=\"convo-wrap\">\n          <div class=\"messages\" id=\"messages\"><div class=\"messages-inner\" id=\"messages-inner\"><\u002Fdiv><\u002Fdiv>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Composer (moves between hero & dock via JS by re-parenting) -->\n      <div class=\"dock\" id=\"dock-empty\">\n        <div class=\"composer\">\n          <textarea id=\"input\" rows=\"1\" placeholder=\"سؤالت درباره‌ی هر گوشی‌ای رو بپرس…\"><\u002Ftextarea>\n          <button class=\"send-btn\" id=\"send\" aria-label=\"ارسال\" disabled=\"\">\n            <svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2.2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M12 19V5M5 12l7-7 7 7\"><\u002Fpath><\u002Fsvg>\n          <\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <!-- Footer -->\n      <footer class=\"foot\">\n        <nav class=\"foot-links\">\n          <a href=\"#privacy\">حریم خصوصی<\u002Fa>\n          <span class=\"foot-sep\">|<\u002Fspan>\n          <a href=\"#about\">ارتباط با ما<\u002Fa>\n          <span class=\"foot-sep\">|<\u002Fspan>\n          <a href=\"#contact\">تماس با ما<\u002Fa>\n        <\u002Fnav>\n      <\u002Ffooter>\n    <\u002Fmain>\n  <\u002Fdiv>\n\n  <!-- Particle field -->\n  <script src=\"29c126fd-fdd6-4d6a-b1cd-92d1097f68be\"><\u002Fscript>\n\n  <script>\n    (function () {\n      const app = document.getElementById('app');\n      const main = document.getElementById('main');\n      const input = document.getElementById('input');\n      const sendBtn = document.getElementById('send');\n      const messagesInner = document.getElementById('messages-inner');\n      const messages = document.getElementById('messages');\n      const dock = document.getElementById('dock-empty');\n      const stage = document.querySelector('.stage');\n      const histList = document.getElementById('hist-list');\n      const LOGO = 'assets/hmr-logo.svg';\n\n      let conversation = [];\n\n      /* ── Sidebar collapse ── */\n      document.getElementById('toggle-sb').addEventListener('click', () => app.classList.add('sb-collapsed'));\n      document.getElementById('open-sb').addEventListener('click', () => app.classList.remove('sb-collapsed'));\n\n      /* ── Composer auto-grow + enable ── */\n      function autosize() {\n        input.style.height = 'auto';\n        input.style.height = Math.min(input.scrollHeight, 180) + 'px';\n        sendBtn.disabled = input.value.trim().length === 0;\n      }\n      input.addEventListener('input', autosize);\n      input.addEventListener('keydown', (e) => {\n        if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }\n      });\n      sendBtn.addEventListener('click', send);\n\n      /* ── New chat ── */\n      document.getElementById('new-chat').addEventListener('click', () => {\n        conversation = [];\n        messagesInner.innerHTML = '';\n        main.classList.remove('has-chat');\n        // return composer to hero position\n        stage.querySelector('.hero').after(dock);\n        input.value = ''; autosize(); input.focus();\n      });\n\n      function enterChatMode() {\n        if (main.classList.contains('has-chat')) return;\n        main.classList.add('has-chat');\n        // dock composer to the bottom of the conversation\n        const convoWrap = document.querySelector('.convo-wrap');\n        dock.classList.add('docked');\n        main.insertBefore(dock, document.querySelector('.foot'));\n      }\n\n      function addBubble(role, text) {\n        const wrap = document.createElement('div');\n        wrap.className = 'msg ' + role;\n        const ava = document.createElement('div');\n        ava.className = 'msg-ava';\n        if (role === 'assistant') ava.innerHTML = '<img src=\"' + LOGO + '\" alt=\"HMR\" />';\n        const bubble = document.createElement('div');\n        bubble.className = 'bubble';\n        bubble.textContent = text;\n        wrap.appendChild(ava); wrap.appendChild(bubble);\n        messagesInner.appendChild(wrap);\n        messages.scrollTop = messages.scrollHeight;\n        return bubble;\n      }\n\n      function addTyping() {\n        const wrap = document.createElement('div');\n        wrap.className = 'msg assistant';\n        wrap.innerHTML = '<div class=\"msg-ava\"><img src=\"' + LOGO + '\" alt=\"HMR\" /><\u002Fdiv><div class=\"bubble\"><span class=\"typing\"><i><\u002Fi><i><\u002Fi><i><\u002Fi><\u002Fspan><\u002Fdiv>';\n        messagesInner.appendChild(wrap);\n        messages.scrollTop = messages.scrollHeight;\n        return wrap;\n      }\n\n      // Demo responder (preview only — production calls Flowise)\n      const DEMO = 'این یک پیش‌نمایش ظاهری از مشاور همر است. در نسخه‌ی اصلی، پاسخ‌ها از پایگاه دانش به‌روز بازار موبایل ایران می‌آید. اگر چیزی را با اطمینان ندانم، صادقانه می‌گویم و تو را به یک متخصص ارجاع می‌دهم.';\n\n      function send() {\n        const text = input.value.trim();\n        if (!text) return;\n        enterChatMode();\n        addBubble('user', text);\n        conversation.push({ role: 'user', text });\n        input.value = ''; autosize(); sendBtn.disabled = true;\n\n        const typing = addTyping();\n        setTimeout(() => {\n          typing.remove();\n          const b = addBubble('assistant', '');\n          // simple typewriter\n          let i = 0;\n          (function type() {\n            b.textContent = DEMO.slice(0, i);\n            messages.scrollTop = messages.scrollHeight;\n            if (i < DEMO.length) { i += 2; setTimeout(type, 12); }\n          })();\n          conversation.push({ role: 'assistant', text: DEMO });\n          syncHistory(text);\n        }, 900);\n      }\n\n      /* ── History (preview: just shows current thread title) ── */\n      function syncHistory(firstQ) {\n        if (histList.querySelector('.hist-empty')) histList.innerHTML = '';\n        if (histList.dataset.added) return;\n        const item = document.createElement('div');\n        item.className = 'hist-item active';\n        item.innerHTML = '<svg viewBox=\"0 0 24 24\" fill=\"none\" stroke=\"currentColor\" stroke-width=\"2\" stroke-linecap=\"round\" stroke-linejoin=\"round\"><path d=\"M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z\"><\u002Fpath><\u002Fsvg><span>' + firstQ + '<\u002Fspan>';\n        histList.appendChild(item);\n        histList.dataset.added = '1';\n      }\n\n      autosize();\n      input.focus();\n    })();\n  <\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
